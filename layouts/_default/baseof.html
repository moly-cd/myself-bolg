<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css">
  <link rel="stylesheet" href="{{ relURL "css/base.css" }}">
  <link rel="stylesheet" href="{{ relURL "css/user-theme.css" }}">
</head>

<body class="{{ if .IsHome }}home-template{{ else }}{{ with .Type }}{{ . }}-template{{ end }}{{ end }}">
  <canvas id="canvas" aria-hidden="true"></canvas>
  <div class="site-fish-layer" aria-hidden="true">
    <img class="site-fish site-fish-one" data-site-fish src="{{ relURL "images/fish-background.svg" }}" alt="">
    <img class="site-fish site-fish-two" data-site-fish src="{{ relURL "images/fish-background.svg" }}" alt="">
    <img class="site-fish site-fish-three" data-site-fish src="{{ relURL "images/fish-background.svg" }}" alt="">
  </div>

  <nav class="top-nav{{ if .IsHome }} is-ghost{{ end }}" aria-label="主导航">
    <div class="nav-shell">
      <div class="nav-container">
        <a class="nav-profile" href="{{ relURL "/" }}" aria-label="个人主页">
          <img src="{{ relURL "images/avatar-placeholder.svg" }}" alt="个人头像">
        </a>

        <ul class="nav-links" id="mainNavLinks">
          <li>
            <a class="nav-item-link" data-nav-path="/" href="{{ relURL "/" }}">
              <img class="nav-icon"
                src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%230f766e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V21h13V9.5"/><path d="M10 21v-6h4v6"/></svg>'
                alt="">
              <span>首页</span>
            </a>
          </li>
          <li>
            <a class="nav-item-link" data-nav-path="/music/" href="{{ relURL "/music/" }}">
              <img class="nav-icon"
                src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%230f766e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V6.5l10-2V16"/><circle cx="7" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg>'
                alt="">
              <span>音乐</span>
            </a>
          </li>
          <li>
            <a class="nav-item-link" data-nav-path="/gallery/" href="{{ relURL "/gallery/" }}">
              <img class="nav-icon"
                src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%230f766e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="m21 16-4.5-4.5L8 20"/></svg>'
                alt="">
              <span>相册</span>
            </a>
          </li>
          <li>
            <a class="nav-item-link" data-nav-path="/games/" href="{{ relURL "/games/" }}">
              <img class="nav-icon"
                src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%230f766e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10h10a4 4 0 0 1 3.7 5.5l-1.2 2.8a2 2 0 0 1-3 1l-2.5-1.7a3 3 0 0 0-3.4 0l-2.5 1.7a2 2 0 0 1-3-1L3.3 15.5A4 4 0 0 1 7 10Z"/><path d="M8 13v3"/><path d="M6.5 14.5h3"/><circle cx="16.5" cy="13.5" r=".8" fill="%230f766e" stroke="none"/><circle cx="18.8" cy="15.8" r=".8" fill="%230f766e" stroke="none"/></svg>'
                alt="">
              <span>游戏</span>
            </a>
          </li>
          <li>
            <a class="nav-item-link" data-nav-path="/guestbook/" href="{{ relURL "/guestbook/" }}">
              <img class="nav-icon"
                src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%230f766e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v6A2.5 2.5 0 0 1 16.5 15H11l-4.5 4v-4H7.5A2.5 2.5 0 0 1 5 12.5Z"/></svg>'
                alt="">
              <span>留言板</span>
            </a>
          </li>
        </ul>

        <button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="mainNavLinks"
          aria-label="打开导航菜单">
          &#9776;
        </button>
      </div>
    </div>
  </nav>

  <div class="site-shell">
    {{ if not .IsHome }}
    <header>
      <p>站点名称：{{ .Site.Title }}</p>
      <h1>{{ .Site.Title }}</h1>
      <p>{{ .Site.Params.description }}</p>
      <hr>
    </header>
    {{ end }}

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    {{ if not .IsHome }}
    <footer>
      <hr>
      <p>作者：{{ .Site.Params.author }}</p>
    </footer>
    {{ end }}
  </div>

  <aside class="blog-aplayer-dock" data-aplayer-dock aria-label="悬浮音乐播放器">
    <div id="aplayer" class="blog-aplayer"></div>
    <button class="blog-aplayer-handle" type="button" data-aplayer-handle aria-label="展开或收起音乐播放器">
      ›
    </button>
  </aside>

  <script src="{{ relURL "js/mouse-squiggle.js" }}" defer></script>
  <script src="{{ relURL "js/navbar.js" }}" defer></script>
  <script src="{{ relURL "js/home-carousel.js" }}" defer></script>
  <script src="{{ relURL "js/fish-background.js" }}" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js" defer></script>
  <script src="{{ relURL "js/aplayer-init.js" }}" defer></script>
</body>

</html>
